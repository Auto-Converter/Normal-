* { box-sizing: border-box; }

body {
    margin: 0;
    padding: 16px;
    font-family: Tahoma, sans-serif;
    background: #f4f4f9;
    color: #222;
}

.container {
    max-width: 700px;
    margin: auto;
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 6px 20px #0002;
    padding: 18px;
}

h2 {
    margin: 0 0 18px;
    text-align: center;
    font-size: 22px;
}

.field { margin-bottom: 16px; }

.label-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
}

.field-title {
    font-weight: 700;
    font-size: 14px;
    color: #444;
}

.copy-btn {
    border: 0;
    border-radius: 10px;
    background: #2d7ef7;
    color: #fff;
    cursor: pointer;
    padding: 8px 12px;
    font-size: 13px;
    transition: .2s;
}

.copy-btn:hover { background: #1f66d1; }

textarea {
    width: 100%;
    min-height: 150px;
    resize: vertical;
    border: 1px solid #d6d6d6;
    border-radius: 14px;
    padding: 14px;
    font-size: 15px;
    outline: 0;
    background: #fafafa;
}

.status {
    min-height: 24px;
    margin-top: 10px;
    text-align: center;
    font-size: 14px;
    color: #555;
}

footer {
    text-align: center;
    font-size: 13px;
    color: #777;
    margin-top: 18px;
}

.logout-button-day {
    padding: 12px 25px;
    font-size: 16px;
    background-color: #007bff;
    color: white;
    border: none;
    border-radius: 8px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    transition: all 0.3s ease;
    cursor: pointer;
}

.logout-button-day:hover {
    background-color: #b91c1c;
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(220, 38, 38, 0.4);
}

@media (max-width: 600px) {
    .logout-button-day {
        position: fixed;
        top: 8px;
        right: 8px;
        left: auto;
        width: auto;
        padding: 6px 10px;
        font-size: 12px;
        border-radius: 8px;
    }
}

@media(max-width:520px) {
    textarea { min-height: 140px; font-size: 14px }
    h2 { font-size: 20px }
}

body.dark-mode {
    background: #121212;
    color: #e0e0e0;
}

body.dark-mode .container {
    background: #1e1e1e;
    box-shadow: 0 6px 20px #0005;
}

body.dark-mode h2 {
    color: #ffffff;
}

body.dark-mode .field-title {
    color: #bbb;
}

body.dark-mode .copy-btn {
    background: #4a90e2;
}

body.dark-mode .copy-btn:hover {
    background: #357abd;
}

body.dark-mode textarea {
    border: 1px solid #444;
    background: #2a2a2a;
    color: #e0e0e0;
}

body.dark-mode .status {
    color: #aaa;
}

body.dark-mode footer {
    color: #777;
}

body.dark-mode .logout-button-day {
    background-color: #e53e3e;
    box-shadow: 0 4px 6px rgba(200, 0, 0, 0.2);
}

body.dark-mode .logout-button-day:hover {
    background-color: #c53030;
    box-shadow: 0 6px 15px rgba(175, 20, 20, 0.4);
}

@media (max-width: 600px) and (prefers-color-scheme: dark) {
    body:not(.dark-mode) .logout-button-day {
    }
    body.dark-mode .logout-button-day {
        position: fixed;
        top: 8px;
        right: 8px;
        left: auto;
        width: auto;
        padding: 6px 10px;
        font-size: 12px;
        border-radius: 8px;
        background-color: #e53e3e;
        box-shadow: 0 4px 6px rgba(200, 0, 0, 0.2);
    }
    body.dark-mode .logout-button-day:hover {
        background-color: #c53030;
        box-shadow: 0 6px 15px rgba(175, 20, 20, 0.4);
    }
}

async function getCryptoKey(){

    const encoder =
    new TextEncoder()

    const keyData =
    encoder.encode(
    SECRET_KEY_STR
    )

    const hash =
    await crypto.subtle.digest(
    "SHA-256",
    keyData
    )

    return crypto.subtle.importKey(
        "raw",
        hash,
        { name:"AES-GCM" },
        false,
        [
          "encrypt",
          "decrypt"
        ]
    )
}

async function processData(
text,
mode
){

    const key =
    await getCryptoKey()

    if(
      mode==="encrypt"
    ){

        const stream =
        new Blob([text])
        .stream()
        .pipeThrough(
        new CompressionStream(
        "gzip"
        ))

        const compressed =
        await new Response(
        stream
        ).arrayBuffer()

        const iv =
        crypto.getRandomValues(
        new Uint8Array(12)
        )

        const encrypted =
        await crypto.subtle.encrypt(
        {
          name:"AES-GCM",
          iv
        },
        key,
        compressed
        )

        const combined =
        new Uint8Array(
        iv.length +
        encrypted.byteLength
        )

        combined.set(iv)

        combined.set(
        new Uint8Array(
        encrypted
        ),
        iv.length
        )

        return btoa(
        String.fromCharCode(
        ...combined
        )
        )

    }else{

        const data =
        Uint8Array.from(
        atob(text),
        c=>c.charCodeAt(0)
        )

        const iv =
        data.slice(0,12)

        const encryptedData =
        data.slice(12)

        const decrypted =
        await crypto.subtle.decrypt(
        {
          name:"AES-GCM",
          iv
        },
        key,
        encryptedData
        )

        const stream =
        new Blob([decrypted])
        .stream()
        .pipeThrough(
        new DecompressionStream(
        "gzip"
        ))

        return await new Response(
        stream
        ).text()
    }
}

window.copyText =
async function(id){

    const el =
    document.getElementById(id)

    const statusBox =
    document.getElementById(
    "status"
    )

    if(!el) return

    try{

        await navigator
        .clipboard
        .writeText(
        el.value
        )

        statusBox.textContent =
        "کپی شد ✅"

    }catch{

        el.select()

        document.execCommand(
        "copy"
        )

        statusBox.textContent =
        "کپی شد ✅"
    }

    setTimeout(()=>{

        statusBox.textContent=""

    },2000)
}

async function saveTranslation(
text
){

    const {
      data:{user}
    } = await supabase
    .auth
    .getUser()

    if(!user) return

    await supabase
    .from(
    "translations"
    )
    .insert({

      user_id:user.id,

      text_content:text

    })
}

document.addEventListener(
"DOMContentLoaded",
()=>{

    const input =
    document.getElementById(
    "inputArea"
    )

    const output =
    document.getElementById(
    "outputArea"
    )

    const statusBox =
    document.getElementById(
    "status"
    )

    if(!input) return

    input.addEventListener(
    "input",
    async ()=>{

        const val =
        input.value.trim()

        if(!val){

            output.value = ""

            return
        }

        try{

            let readableText

            if(
                val.length > 20 &&
                !/[^A-Za-z0-9+/=]/.test(
                val
                )
            ){

                const decodedText =
                await processData(
                val,
                "decrypt"
                )

                output.value =
                decodedText

                readableText =
                decodedText

                statusBox.textContent =
                "رمزگشایی شد ✅"

            }else{

                const encodedText =
                await processData(
                val,
                "encrypt"
                )

                output.value =
                encodedText

                readableText =
                val

                statusBox.textContent =
                "فشرده و رمزگذاری شد ✅"
            }

            clearTimeout(
            saveTimer
            )

            saveTimer =
            setTimeout(
            async ()=>{

                await saveTranslation(
                readableText
                )

            },
            3000
            )

        }catch{

            statusBox.textContent =
            "خطا در پردازش!"
        }
    })
})
