<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <title>Error</title>

  <style>
    :root{
      color-scheme: light dark;

      --bg1:#f5f7fb;
      --bg2:#eef2ff;

      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --border: rgba(17,24,39,.10);

      --accent:#2563eb;
      --accent-hover:#1d4ed8;

      --icon-bg: rgba(37,99,235,.12);
      --icon: #2563eb;

      --shadow: 0 18px 60px rgba(0,0,0,.08);
    }

    @media (prefers-color-scheme: dark){
      :root{
        --bg1:#0b1224;
        --bg2:#0f1b3a;

        --card:#0f172a;
        --text:#f9fafb;
        --muted:#cbd5e1;
        --border: rgba(255,255,255,.10);

        --accent:#60a5fa;
        --accent-hover:#3b82f6;

        --icon-bg: rgba(96,165,250,.14);
        --icon:#93c5fd;

        --shadow: 0 18px 60px rgba(0,0,0,.45);
      }
    }

    * { box-sizing: border-box; }

    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;

      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      color:var(--text);

      background: radial-gradient(900px 500px at 10% 10%, var(--bg2), transparent 55%),
                  linear-gradient(135deg, var(--bg1), var(--bg2));
    }

    .card{
      width:100%;
      max-width:440px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:26px 20px;
      text-align:center;
      position:relative;
      overflow:hidden;

      transform: translateY(10px);
      opacity: 0;
      animation: floatIn .45s ease-out forwards;
    }

    /* نور پس‌زمینه خیلی ملایم */
    .card::before{
      content:"";
      position:absolute;
      inset:-2px;
      background: radial-gradient(400px 120px at 50% 0%, rgba(37,99,235,.18), transparent 55%);
      pointer-events:none;
      opacity:.9;
    }

    @keyframes floatIn{
      to{ transform: translateY(0); opacity:1; }
    }

    .icon{
      width:74px;
      height:74px;
      border-radius:50%;
      margin:0 auto 14px;
      background:var(--icon-bg);
      color:var(--icon);
      display:grid;
      place-items:center;

      font-size:36px;
      font-weight:800;
      position:relative;

      transform: scale(.98);
      animation: pop .55s ease-out .08s both;
    }

    @keyframes pop{
      0%{ transform: scale(.85); }
      60%{ transform: scale(1.04); }
      100%{ transform: scale(.98); }
    }

    .title{
      margin:0 0 8px;
      font-size: clamp(1.6rem, 4.5vw, 2.05rem);
      letter-spacing: -0.02em;
    }

    .desc{
      margin:0;
      color:var(--muted);
      line-height:1.85;
      font-size:1rem;
    }

    .support{
      margin-top:18px;
      padding-top:16px;
      border-top:1px solid var(--border);
    }

    .support a{
      display:flex;
      width:100%;
      align-items:center;
      justify-content:center;
      gap:10px;

      text-decoration:none;
      background:var(--accent);
      color:#fff;
      font-weight:700;

      padding:14px 16px;
      border-radius:14px;

      transition: transform .18s ease, background-color .18s ease, box-shadow .18s ease;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    .support a:hover{
      background:var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(37,99,235,.28);
    }

    .support small{
      display:block;
      margin-top:12px;
      color:var(--muted);
      font-size:.92rem;
      word-break:break-word;
    }

    .dots{
      margin:12px auto 0;
      display:flex;
      gap:8px;
      justify-content:center;
      height:10px;
      align-items:center;
      opacity:.75;
    }

    .dot{
      width:8px; height:8px;
      border-radius:50%;
      background: var(--accent);
      animation: pulse 1s ease-in-out infinite;
    }
    .dot:nth-child(2){ animation-delay: .15s; opacity:.85; }
    .dot:nth-child(3){ animation-delay: .30s; opacity:.7; }

    @keyframes pulse{
      0%,100%{ transform: translateY(0); opacity:.55; }
      50%{ transform: translateY(-4px); opacity:1; }
    }

    /* کاهش حرکت برای کسانی که ترجیح می‌دن انیمیشن کم باشه */
    @media (prefers-reduced-motion: reduce){
      .card, .icon { animation: none !important; }
      .dot { animation: none !important; }
      .support a { transition:none !important; }
    }
  </style>
</head>

<body>
  <main class="card" role="main" aria-labelledby="error-title">
    <div class="icon" aria-hidden="true">!</div>

    <h1 class="title" id="error-title">مشکلی پیش آمده</h1>

    <p class="desc">
      متأسفیم، در حال حاضر امکان نمایش این بخش وجود ندارد.
      <br/>
      برای راهنمایی بیشتر با پشتیبانی در ارتباط باشید.
    </p>

    <div class="dots" aria-hidden="true">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>

    <section class="support">
      <a href="https://splus.ir/JJDEVSPluse" target="_blank" rel="noopener noreferrer">
        <span aria-hidden="true">💬</span>
        ارتباط با پشتیبانی
      </a>
      <small>آیدی پشتیبانی: @JJDEVSPluse</small>
    </section>
  </main>
</body>
</html>
